# Large model evaluation config
# Configured for 70B+ models requiring multiple GPUs
# Usage: olmo-eval beaker launch -f examples/configs/large_model.yaml --dry-run

name: eval-llama70b-full
models:
  - meta-llama/Llama-3.1-70B-Instruct

tasks:
  - mmlu
  - gsm8k
  - hellaswag
  - arc_challenge
  - winogrande
  - truthfulqa

cluster: ai2/ceres
gpus: 4
priority: high
preemptible: false
timeout: 48h
retries: 2

description: "Full evaluation suite for Llama 70B"
