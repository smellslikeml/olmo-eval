# Mixed model sizes evaluation
#
# Demonstrates per-model GPU allocation. Each model specifies how many GPUs
# it needs for inference. Priorities are set on tasks, not models.
#
# Usage: olmo-eval beaker launch -f examples/configs/mixed_gpu.yaml --dry-run
#
# This config creates 2 experiments (one per model, same priority):
#   - test-mixed-gpus-llama-3.1-8b   (1 GPU)
#   - test-mixed-gpus-llama-3.1-70b  (4 GPUs)

name: test-mixed-gpus

models:
  # Small model - 1 GPU
  - name_or_path: meta-llama/Llama-3.1-8B
    gpus: 1

  # Large model - 4 GPUs, more shared memory
  - name_or_path: meta-llama/Llama-3.1-70B
    gpus: 4
    shared_memory: "20GiB"
    timeout: 48h

tasks:
  - arc:mc

cluster: ai2/ceres
preemptible: true
timeout: 24h
