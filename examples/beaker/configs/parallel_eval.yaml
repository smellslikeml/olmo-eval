# Parallel model evaluation with automatic experiment splitting
#
# This config demonstrates how to run multiple instances of models in parallel.
# When total GPUs (parallelism x gpus_per_model) exceeds max_gpus_per_node,
# tasks are automatically split across multiple experiments.
#
# Usage: olmo-eval beaker launch -f examples/configs/parallel_eval.yaml --dry-run

name: eval-parallel-splits

models:
  - name_or_path: meta-llama/Llama-3.1-8B
    gpus: 1
    parallelism: 4

  - name_or_path: meta-llama/Llama-3.1-70B
    gpus: 4
    parallelism: 4
    timeout: 48h

tasks:
  - gsm8k
  - arc_challenge
  - hellaswag
  - winogrande

cluster: ai2/ceres
preemptible: true
timeout: 24h
