<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>$page_title</title>
  <style>
$styles
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-copy">
          <div class="brand-name">olmo-eval</div>
          <div class="brand-sub">Results viewer</div>
        </div>
        <div class="tabs" role="tablist">
          <button id="view-matrix" class="tab">paired test</button>
          <button id="view-table" class="tab">results</button>
        </div>
      </div>
      <form method="get" class="scope-form">
$group_select
$scope_select
$run_mode_control
$metric_control
      </form>
      <div class="filters">
        <label class="filter-block filter-block-regex">
          <span class="select-label">filter</span>
          <div id="regex-wrap" class="regex">
            <span class="regex-slash">/</span>
            <input
              id="regex-filter"
              class="regex-input"
              placeholder="filter model names..."
              spellcheck="false"
              autocapitalize="off"
              autocomplete="off"
            />
            <span class="regex-slash">/</span>
            <span id="regex-count" class="regex-count">0/0</span>
          </div>
        </label>
$model_filter_control
      </div>
    </header>
    <main class="main">
      <div id="browser-root"></div>
    </main>
    <div id="pairwise-tooltip" class="tooltip hidden"></div>
  </div>
  <script>
    window.RESULTS_VIEWER_DATA = $payload_json;
  </script>
  <script>
$script
  </script>
</body>
</html>
