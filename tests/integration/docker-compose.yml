services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: olmo_eval_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d olmo_eval_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro

  localstack:
    image: localstack/localstack:3.0
    environment:
      SERVICES: s3
      DEBUG: 0
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:4566/_localstack/health | grep -q '\"s3\": \"available\"'"]
      interval: 5s
      timeout: 5s
      retries: 5
